<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nokia Snake — C++ OOP Port</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --phone-body:     #c8c8c8;
    --phone-dark:     #a0a0a0;
    --phone-shadow:   #707070;
    --phone-light:    #e8e8e8;
    --phone-accent:   #3a3a3a;
    --screen-bg:      #c7d1af;
    --screen-border:  #8a9278;
    --screen-dark:    #434b3e;
    --screen-mid:     #6b7560;
    --screen-light:   #b5c09f;
    --key-body:       #b0b0b0;
    --key-dark:       #888;
    --key-press:      #d8d8d8;
    --nokia-blue:     #124191;
    --cell: 13px;
    --cols: 20;
    --rows: 18;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: radial-gradient(ellipse at center, #2a2a2a 0%, #111 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Press Start 2P', monospace;
    user-select: none;
  }

  /* ── Phone body ── */
  .phone {
    width: 320px;
    background: linear-gradient(160deg, var(--phone-light) 0%, var(--phone-body) 40%, var(--phone-dark) 100%);
    border-radius: 28px 28px 44px 44px;
    padding: 16px 18px 30px;
    box-shadow:
      inset 2px 2px 4px rgba(255,255,255,0.7),
      inset -2px -2px 4px rgba(0,0,0,0.2),
      6px 10px 30px rgba(0,0,0,0.75),
      0 2px 4px rgba(0,0,0,0.5);
    position: relative;
    border: 1px solid var(--phone-shadow);
  }

  .phone::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(255,255,255,0.015) 2px,rgba(255,255,255,0.015) 4px);
    pointer-events: none;
  }

  .nokia-logo {
    text-align: center;
    margin-bottom: 10px;
    letter-spacing: 4px;
    font-size: 14px;
    font-weight: 900;
    color: var(--nokia-blue);
    font-family: 'Arial Black', Arial, sans-serif;
    text-shadow: 0 1px 0 rgba(255,255,255,0.6);
    text-transform: uppercase;
  }

  .speaker {
    display: flex;
    justify-content: center;
    gap: 3px;
    margin-bottom: 8px;
  }
  .speaker span {
    width: 2px;
    height: 6px;
    background: var(--phone-shadow);
    border-radius: 1px;
  }

  /* ── Screen ── */
  .screen-housing {
    background: linear-gradient(180deg, #555 0%, #333 100%);
    border-radius: 6px;
    padding: 6px;
    margin-bottom: 14px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 1px 0 rgba(255,255,255,0.3);
  }

  .screen-inner {
    background: var(--screen-bg);
    border-radius: 3px;
    padding: 4px;
    position: relative;
    box-shadow: inset 0 0 8px rgba(0,0,0,0.3);
    overflow: hidden;
  }

  .screen-inner::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 3px;
    background: repeating-linear-gradient(0deg,transparent,transparent 1px,rgba(0,0,0,0.04) 1px,rgba(0,0,0,0.04) 2px);
    pointer-events: none;
    z-index: 10;
  }

  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2px 3px;
    margin-bottom: 2px;
  }
  .status-bar span { font-size: 5px; color: var(--screen-dark); line-height: 1; }

  #gameCanvas {
    display: block;
    width: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }

  .score-bar {
    display: flex;
    justify-content: space-between;
    padding: 3px 3px 1px;
  }
  .score-bar span { font-size: 5px; color: var(--screen-dark); line-height: 1; }

  /* ── Nav ring ── */
  .nav-ring-wrap { display: flex; justify-content: center; margin-bottom: 12px; }
  .nav-ring { position: relative; width: 90px; height: 90px; }

  .nav-ring-outer {
    position: absolute; inset: 0; border-radius: 50%;
    background: linear-gradient(145deg, #a8a8a8, #888);
    box-shadow: 0 3px 8px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.3);
  }

  .nav-center {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(145deg, #d8d8d8, #b8b8b8);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4), inset 0 1px 1px rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: 5px; color: #444; cursor: pointer; z-index: 5;
    transition: transform 0.08s;
  }
  .nav-center:active { transform: translate(-50%,-50%) scale(0.93); }

  .nav-btn {
    position: absolute; display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 4; transition: opacity 0.1s;
  }
  .nav-btn:active { opacity: 0.5; }
  .nav-btn svg { pointer-events: none; }
  .nav-up    { top: 4px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; }
  .nav-down  { bottom: 4px; left: 50%; transform: translateX(-50%); width: 30px; height: 30px; }
  .nav-left  { left: 4px; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; }
  .nav-right { right: 4px; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; }

  /* ── Keypad ── */
  .keypad { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .key-row { display: flex; gap: 6px; }

  .key {
    width: 52px; height: 26px; border-radius: 6px;
    background: linear-gradient(180deg, var(--key-press) 0%, var(--key-body) 60%, var(--key-dark) 100%);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.6), 0 2px 4px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    cursor: pointer; transition: transform 0.08s, box-shadow 0.08s;
    position: relative; border: 1px solid #999;
  }
  .key:active, .key.pressed {
    transform: translateY(1px);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.3), 0 1px 1px rgba(0,0,0,0.4);
  }
  .key-num { font-size: 9px; color: #222; font-family: 'Arial Black', sans-serif; line-height: 1; }
  .key-alpha { font-size: 5px; color: #555; font-family: Arial, sans-serif; letter-spacing: 1px; line-height: 1; margin-top: 2px; }
  .key[data-dir] { border-color: #888; }
  .key[data-dir] .key-num { color: var(--nokia-blue); }

  .key-wide { width: 110px; height: 26px; }
  .key-call { background: linear-gradient(180deg, #6fc26f, #3d8c3d 60%, #2a6a2a 100%); }
  .key-call .key-num { color: #fff; font-size: 8px; }
  .key-end  { background: linear-gradient(180deg, #d06060, #a03030 60%, #802020 100%); }
  .key-end .key-num  { color: #fff; font-size: 8px; }

  .phone-bottom { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }

  /* ── Overlay ── */
  #overlay {
    position: absolute; inset: 0;
    background: rgba(199,209,175,0.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 20; border-radius: 3px; gap: 8px; padding: 6px;
  }
  #overlay .ov-title { font-size: 8px; color: var(--screen-dark); text-align: center; line-height: 1.8; }
  #overlay .ov-sub   { font-size: 6px; color: var(--screen-mid);  text-align: center; line-height: 2; }
  #overlay .ov-score { font-size: 6px; color: var(--screen-dark); text-align: center; line-height: 2; }
  #overlay.hidden { display: none; }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .blink { animation: blink 1s step-start infinite; }
</style>
</head>
<body>

<div class="phone">
  <div class="nokia-logo">Nokia</div>
  <div class="speaker">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="screen-housing">
    <div class="screen-inner">
      <div class="status-bar">
        <span id="levelLabel">SNAKE</span>
        <span>&#9679;&#9679;&#9679;</span>
      </div>
      <canvas id="gameCanvas"></canvas>
      <div class="score-bar">
        <span>SCR:<span id="scoreDisp">0</span></span>
        <span>HI:<span id="hiDisp">0</span></span>
      </div>
      <div id="overlay">
        <div class="ov-title" id="ovTitle">SNAKE</div>
        <div class="ov-sub"  id="ovSub">PRESS OK<br>OR 5 TO START</div>
        <div class="ov-score" id="ovScore"></div>
      </div>
    </div>
  </div>

  <div class="nav-ring-wrap">
    <div class="nav-ring">
      <div class="nav-ring-outer"></div>
      <div class="nav-btn nav-up"    data-dir="up"    title="Up (W/8)">
        <svg width="14" height="11" viewBox="0 0 12 10"><polygon points="6,1 11,9 1,9" fill="#555"/></svg>
      </div>
      <div class="nav-btn nav-down"  data-dir="down"  title="Down (S/2)">
        <svg width="14" height="11" viewBox="0 0 12 10"><polygon points="6,9 1,1 11,1" fill="#555"/></svg>
      </div>
      <div class="nav-btn nav-left"  data-dir="left"  title="Left (A/4)">
        <svg width="11" height="14" viewBox="0 0 10 12"><polygon points="1,6 9,1 9,11" fill="#555"/></svg>
      </div>
      <div class="nav-btn nav-right" data-dir="right" title="Right (D/6)">
        <svg width="11" height="14" viewBox="0 0 10 12"><polygon points="9,6 1,1 1,11" fill="#555"/></svg>
      </div>
      <div class="nav-center" id="okBtn">OK</div>
    </div>
  </div>

  <div class="keypad">
    <div class="key-row">
      <div class="key" data-key="1"><span class="key-num">1</span><span class="key-alpha"> </span></div>
      <div class="key" data-dir="up"    data-key="2"><span class="key-num">2</span><span class="key-alpha">▲</span></div>
      <div class="key" data-key="3"><span class="key-num">3</span><span class="key-alpha"> </span></div>
    </div>
    <div class="key-row">
      <div class="key" data-dir="left"  data-key="4"><span class="key-num">4</span><span class="key-alpha">◀</span></div>
      <div class="key" data-key="5" id="key5"><span class="key-num">5</span><span class="key-alpha">OK</span></div>
      <div class="key" data-dir="right" data-key="6"><span class="key-num">6</span><span class="key-alpha">▶</span></div>
    </div>
    <div class="key-row">
      <div class="key" data-key="7"><span class="key-num">7</span><span class="key-alpha"> </span></div>
      <div class="key" data-dir="down"  data-key="8"><span class="key-num">8</span><span class="key-alpha">▼</span></div>
      <div class="key" data-key="9"><span class="key-num">9</span><span class="key-alpha"> </span></div>
    </div>
  </div>

  <div class="phone-bottom">
    <div class="key key-wide key-call"><span class="key-num">✆ CALL</span></div>
    <div class="key"><span class="key-num">0</span><span class="key-alpha">+</span></div>
    <div class="key key-wide key-end" id="endBtn"><span class="key-num">END ✆</span></div>
  </div>
</div>

<script>
/* =====================================================
   SNAKE GAME — JS port of C++ OOP logic
   Snake is an array of {x,y} coordinates.
   Wall collision: game ends when head hits any border.
   Self-collision: O(n) linear scan of body.
   ===================================================== */

const COLS       = 20;
const ROWS       = 18;
const CELL       = 13;
const SPEED_BASE = 180;
const CLR_BG     = '#c7d1af';
const CLR_DARK   = '#434b3e';
const CLR_GRID   = '#b8c3a2';
const CLR_HEAD   = '#2a302a';
const CLR_WALL   = '#5a6350';

const canvas = document.getElementById('gameCanvas');
canvas.width  = COLS * CELL;
canvas.height = ROWS * CELL;
const ctx = canvas.getContext('2d');

let snake, dir, nextDir, food, score, hiScore, gameState, ticker;
hiScore = 0;

const DIR = {
  up:    { x: 0, y: -1 },
  down:  { x: 0, y:  1 },
  left:  { x:-1, y:  0 },
  right: { x: 1, y:  0 },
};
const OPPOSITE = { up:'down', down:'up', left:'right', right:'left' };

// ── Setup (mirrors C++ Snake::reset()) ────────────────
function setup() {
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS / 2);
  snake = [
    { x: cx,     y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy },
  ];
  dir     = 'right';
  nextDir = 'right';
  score   = 0;
  updateHUD();
  spawnFood();
}

// ── Food spawn: avoids occupied cells and wall edges ──
function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * (COLS - 2)) + 1,
      y: Math.floor(Math.random() * (ROWS - 2)) + 1,
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

// ── One game tick (mirrors C++ SnakeGame::logic()) ────
function tick() {
  dir = nextDir;

  const head = snake[0];
  const newHead = {
    x: head.x + DIR[dir].x,
    y: head.y + DIR[dir].y,
  };

  // Wall collision — O(1): game ends on any border hit
  if (newHead.x < 0 || newHead.x >= COLS ||
      newHead.y < 0 || newHead.y >= ROWS) {
    endGame(); return;
  }

  // Self-collision — O(n) linear scan
  if (snake.some(s => s.x === newHead.x && s.y === newHead.y)) {
    endGame(); return;
  }

  const ate = newHead.x === food.x && newHead.y === food.y;

  snake.unshift(newHead);
  if (!ate) {
    snake.pop();
  } else {
    score += 10;
    if (score > hiScore) hiScore = score;
    updateHUD();
    spawnFood();
  }

  render();
}

// ── Render ─────────────────────────────────────────────
function render() {
  // Background
  ctx.fillStyle = CLR_BG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Wall border — drawn as filled rectangles on all 4 edges
  ctx.fillStyle = CLR_WALL;
  ctx.fillRect(0, 0, canvas.width, CELL);                      // top
  ctx.fillRect(0, (ROWS-1)*CELL, canvas.width, CELL);          // bottom
  ctx.fillRect(0, 0, CELL, canvas.height);                     // left
  ctx.fillRect((COLS-1)*CELL, 0, CELL, canvas.height);         // right

  // Faint grid (playable area only, inside walls)
  ctx.strokeStyle = CLR_GRID;
  ctx.lineWidth   = 0.4;
  for (let x = 1; x < COLS - 1; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, CELL);
    ctx.lineTo(x * CELL, (ROWS-1) * CELL);
    ctx.stroke();
  }
  for (let y = 1; y < ROWS - 1; y++) {
    ctx.beginPath();
    ctx.moveTo(CELL, y * CELL);
    ctx.lineTo((COLS-1) * CELL, y * CELL);
    ctx.stroke();
  }

  // Food
  ctx.fillStyle = CLR_DARK;
  ctx.fillRect(food.x * CELL + 2, food.y * CELL + 2, CELL - 4, CELL - 4);
  ctx.fillStyle = 'rgba(255,255,255,0.18)';
  ctx.fillRect(food.x * CELL + 3, food.y * CELL + 3, 4, 4);

  // Snake body (reverse so head drawn on top)
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    if (i === 0) {
      ctx.fillStyle = CLR_HEAD;
      ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
      ctx.fillStyle = CLR_BG;
      const ex  = dir==='left' ? s.x*CELL+2 : dir==='right' ? s.x*CELL+CELL-5 : s.x*CELL+3;
      const ey  = dir==='up'   ? s.y*CELL+2 : dir==='down'  ? s.y*CELL+CELL-5 : s.y*CELL+3;
      const ex2 = dir==='left' ? s.x*CELL+2 : dir==='right' ? s.x*CELL+CELL-5 : s.x*CELL+CELL-6;
      const ey2 = dir==='up'   ? s.y*CELL+2 : dir==='down'  ? s.y*CELL+CELL-5 : s.y*CELL+CELL-6;
      ctx.fillRect(ex,  ey,  2, 2);
      ctx.fillRect(ex2, ey2, 2, 2);
    } else {
      ctx.fillStyle = CLR_DARK;
      ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    }
  }
}

function updateHUD() {
  document.getElementById('scoreDisp').textContent = score;
  document.getElementById('hiDisp').textContent    = hiScore;
}

function showOverlay(title, sub, scoreText) {
  document.getElementById('ovTitle').textContent = title;
  document.getElementById('ovSub').innerHTML     = sub;
  document.getElementById('ovScore').innerHTML   = scoreText || '';
  document.getElementById('overlay').classList.remove('hidden');
}
function hideOverlay() {
  document.getElementById('overlay').classList.add('hidden');
}

function startGame() {
  if (gameState === 'running') return;
  setup();
  hideOverlay();
  gameState = 'running';
  clearInterval(ticker);
  ticker = setInterval(tick, SPEED_BASE);
  render();
}

function endGame() {
  clearInterval(ticker);
  gameState = 'over';
  render();
  setTimeout(() => {
    showOverlay('GAME OVER', 'PRESS OK<br>OR 5 TO RETRY', `SCORE: ${score}<br>BEST: ${hiScore}`);
  }, 300);
}

function handleDir(d) {
  if (gameState !== 'running') return;
  if (OPPOSITE[d] !== dir) nextDir = d;
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:'up', w:'up', W:'up', '8':'up',
    ArrowDown:'down', s:'down', S:'down', '2':'down',
    ArrowLeft:'left', a:'left', A:'left', '4':'left',
    ArrowRight:'right', d:'right', D:'right', '6':'right',
  };
  const starts = [' ', 'Enter', '5'];
  if (starts.includes(e.key)) { e.preventDefault(); if (gameState !== 'running') startGame(); return; }
  if (map[e.key]) { e.preventDefault(); if (gameState !== 'running') startGame(); else handleDir(map[e.key]); }
});

document.querySelectorAll('.key[data-dir]').forEach(btn => {
  btn.addEventListener('click', () => {
    const d = btn.dataset.dir;
    if (gameState !== 'running') startGame(); else handleDir(d);
    flashKey(btn);
  });
});
document.querySelectorAll('.nav-btn[data-dir]').forEach(btn => {
  btn.addEventListener('click', () => {
    const d = btn.dataset.dir;
    if (gameState !== 'running') startGame(); else handleDir(d);
  });
});
document.getElementById('okBtn').addEventListener('click', () => { if (gameState !== 'running') startGame(); });
document.getElementById('key5').addEventListener('click', () => {
  if (gameState !== 'running') startGame();
  flashKey(document.getElementById('key5'));
});
document.getElementById('endBtn').addEventListener('click', () => {
  if (gameState === 'running') {
    clearInterval(ticker);
    gameState = 'over';
    showOverlay('PAUSED', 'PRESS OK<br>TO RESTART', `SCORE: ${score}`);
  }
});

function flashKey(el) {
  el.classList.add('pressed');
  setTimeout(() => el.classList.remove('pressed'), 120);
}

gameState = 'idle';
setup();
render();
showOverlay('SNAKE', '<span class="blink">PRESS OK</span><br>OR 5 TO START', '');
</script>
</body>
</html>
